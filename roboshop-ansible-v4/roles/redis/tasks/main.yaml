- name: enable redis 7
  command: dnf module enable redis:7 -y
- name: Install redis
  package:
    name: redis
    state: present
- name: allow remote servers
  replace:
    path: /etc/redis/redis.conf
    regexp: '127.0.0.1'
    replace: '0.0.0.0'
- name: disable protected mode
  lineinfile:
    path: /etc/redis/redis.conf
    regexp: 'protected-mode'
    line: 'protected-mode no'
- name: enable redis service
  service:
    name: redis
    state: started
    enabled: yes