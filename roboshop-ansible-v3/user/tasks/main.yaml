- name: "{{ component }} setup"
  import_role:
    name: common
    tasks_from: app-setup

- name: Install NodeJs
  import_role:
    name: common
    tasks_from: node-setup

- name: Systemd setup
  import_role:
    name: common
    tasks_from: system-setup

- name: Restart
  import_role:
    name: common
    tasks_from: restart
