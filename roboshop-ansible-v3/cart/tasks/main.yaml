- name: "{{ component }} setup"
  import_role:
    name: common
    tasks_from: app-setup

- name: Nodejs setup
  import_role:
    name: common
    tasks_from: nodejs-setup

- name: Systemd setup
  import_role:
    name: common
    tasks_from: system-setup

- name: Restart service
  import_role:
    name: common
    tasks_from: restart
