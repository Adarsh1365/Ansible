- name: Setting Payment
  hosts: frontend
  become: yes
  tasks:
    - name: Install Python
      command: dnf module enable nginx:1.24 -y
    - name: Install Nginx
      package:
        name: nginx
        state: present

    - name: Enable payment service
      service:
        name: nginx
        state: started
        enabled: yes

    - name: remove default HTML page
      file:
        path: /usr/share/nginx/html
        state: absent

    - name: Create HTML directory
      file:
        path: /usr/share/nginx/html
        state: directory

    - name: delete app folder
      file:
        path: /app
        state: absent

    - name: delete temp file
      file:
        path: /tmp/frontend.zip
        state: absent

    - name: create new app folder
      file:
        path: /app
        state: directory

    - name: download code
      get_url:
        url: https://roboshop-artifacts.s3.amazonaws.com/frontend-v3.zip
        dest: /tmp/frontend.zip

    - name: Unzip File
      unarchive:
        src: /tmp/frontend.zip
        dest: /usr/share/nginx/html
        remote_src: yes

    - name: remove nginx default conf
      file:
        path: /etc/nginx/nginx.conf
        state: absent
    - name: copy nginx conf
      template:
        src: nginx.conf.j2
        dest: /etc/nginx/nginx.conf

    - name: Enable payment service
      service:
        name: frontend
        state: restarted


