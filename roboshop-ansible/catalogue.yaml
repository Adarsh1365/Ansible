- name: Setting Catalogue
  hosts: catalogue
  become: yes
  tasks:
    - name: Enable NodeJs
      command: dnf module enable nodejs:20 -y

    - name: Install NodeJs
      package:
        name: Nodejs
        state: present

    - name: Create Systemuser
      user:
        name: roboshop
        system: true
        home: /app
        shell: /sbin/nologin
        comment: 'roboshop system user'

    - name: delete app folder
      file:
        path: /app
        state: absent

    - name: delete temp file
      file:
        path: /temp/catalogue.zip
        state: absent

    - name: create new app folder
      file:
        path: /app
        state: directory

    - name: download code
      get_url:
        url: https://roboshop-artifacts.s3.amazonaws.com/catalogue-v3.zip
        dest: /tmp/catalogue.zip

    - name: Unzip File
      unarchive:
        src: /tmp/catalogue.zip
        dest: /app
        remote_src: yes

    - name: install npm dependencies
      community.general.npm:
        path: /app

    - name: Copy service file
      template:
        src: catalogue.service.j2
        dest: /etc/systemd/system/catalogue.service

    - name: Deamon Reload
      systemd_service:
        name: catalogue
        daemon_reload: true

    - name: Enable and start Service
      service:
        name: catalogue
        state: started
        enabled: yes
    - name: Copy Mongo repo
      copy:
        src: ./mongo.repo
        dest: /etc/yum.repos.d/

    - name: Install mongodb client
      package:
        name: mongodb-mongosh
        state: present

    - name: Check Products already loaded
      shell : mongosh --host "{{ MONGODB_HOST }}" --eval 'db.getMongo().getDBNames().indexOf("catalogue")'
      register: catalogue_output

    - name: load Products if not exists
      shell : mongosh --host {{ MONGODB_HOST }} </app/db/master-data.js
      when: catalogue_output.stdout | int < 0

    - name: Deamon Reload
      systemd_service:
        name: catalogue
        daemon_reload: true

    - name: Enable and start Service
      service:
        name: catalogue
        state: started
        enabled: yes
