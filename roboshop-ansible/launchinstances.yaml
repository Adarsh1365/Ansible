- name: Launch Intances
  hosts: local
  connection: local
  vars:
    instances: ["mongodb", "mysql", "redis", "rabbitmq", "frontend"]
    ami_id: ami-0220d79f3f480ecf5
    domain_name: adarshdevopslearn.online
    action: create
  tasks:
    - name: launch instances
      amazon.aws.ec2_instance:
        instance_type: t3.micro
        image_id: "{{ ami_id }}"
        security_groups:
          - roboshop-common
          - "roboshop-{{ item }}"
        name: "roboshop-{{ item }}"
        state: present
      loop: "{{ instances }}"
      register: ec2_data
      when: "{{ action }}" == "create"

    - name: Create 53 records
      amazon.aws.route53:
        state: present
        zone: "{{ domain_name }}"
        record: "{{ item.item }}.{{ domain_name }}"
        type: A
        ttl: 1
        value: "{{ item.instances[0].private_ip_address }}"
        overwrite: true
      loop: "{{ ec2_data.results }}"
      when: "{{ action }}" == "create"

    - name: Create frontend 53 records
      amazon.aws.route53:
        state: present
        zone: "{{ domain_name }}"
        record: "{{ domain_name }}"
        type: A
        ttl: 1
        value: "{{ item.instances[0].public_ip_address }}"
        overwrite: true
      loop: "{{ ec2_data.results }}"
      when:
        - "{{ action }}" == "create"
        - "{{ item.item }}" == "frontend"

    - name: delete instances
      amazon.aws.ec2_instance:
        name: "roboshop-{{ item }}"
        state: absent
        wait: false
      loop: "{{ instances }}"
      when: "{{ action }}" == "delete"

    - name: delete 53 records
      amazon.aws.route53:
        state: absent
        zone: "{{ domain_name }}"
        record: "{{ item }}.{{ domain_name }}"
        type: A
        ttl: 1
      loop: "{{ instances }}"
      when: "{{ action }}" == "delete"

    - name: Delete frontend 53 records
      amazon.aws.route53:
        state: absent
        zone: "{{ domain_name }}"
        record: "{{ domain_name }}"
        type: A
        ttl: 1
      loop: "{{ instances }}"
      when:
        - "{{ action }}" == "create"
        - "{{ item }}" == "frontend"
