- name: Launch Intances
  hosts: local
  connection: local
  vars:
    instances: ["mongodb"]
    ami_id: ami-0220d79f3f480ecf5
    domain_name: adarshdevopslearn.online
  tasks:
    - name: launch instances
      amazon.aws.ec2_instance:
        instance_type: t3.micro
        image_id: "{{ ami_id }}"
        security_groups:
          - roboshop-common
          - "roboshop-{{ item }}"
        name: "roboshop-{{ item }}"
        state: present
      loop: instances
      register: ec2_data

    - name: print result
      debug:
        msg: "{{ ec2_data }}"