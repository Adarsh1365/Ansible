- name: Setting Catalogue
  hosts: cart
  become: yes
  tasks:
    - name: Install Maven
      package:
        name: "{{ item }}"
        state: present
      loop:
        - maven
        - mysql

    - name: Create Systemuser
      user:
        name: roboshop
        system: true
        home: /app
        shell: /sbin/nologin
        comment: 'roboshop system user'

    - name: delete app folder
      file:
        path: /app
        state: absent

    - name: delete temp file
      file:
        path: /tmp/shipping.zip
        state: absent

    - name: create new app folder
      file:
        path: /app
        state: directory

    - name: download code
      get_url:
        url: https://roboshop-artifacts.s3.amazonaws.com/shipping-v3.zip
        dest: /tmp/shipping.zip

    - name: Unzip File
      unarchive:
        src: /tmp/cart.zip
        dest: /app
        remote_src: yes

    - name: install Maven dependencies
      command: mvn clean package
      args:
        chdir: /app

    - name: Move jar file
      command: mv target/shipping-1.0.jar shipping.jar
      args:
        chdir: /app

    - name: Copy shipping service
      template:
        src: shipping.service.j2
        dest: /etc/systemd/system/shipping.service

    - name: system demon reload
      systemd_service:
        name: shipping
        daemon_reload: true

    - name: Enable shipping service
      service:
        name: shipping
        state: started
        enabled: yes

    - name: Load Schema



